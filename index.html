<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris Subventions - Suivi des Contributions Municipales</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eaeaea;
        }
        .header {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid #e94560;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 1.5rem;
            background: rgba(15, 52, 96, 0.5);
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 300px;
            padding: 1rem 1.5rem;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 1rem;
        }
        .search-bar input:focus {
            outline: none;
            border-color: #e94560;
        }
        .search-bar select {
            padding: 1rem 1.5rem;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        .associations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
        }
        .association-card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #0f3460;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        .association-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }
        .association-card.has-conflict {
            border-left: 4px solid #dc2626;
        }
        .conflict-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc2626;
            color: #fff;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0.3rem;
        }
        .card-siret {
            font-size: 0.8rem;
            color: #a0a0a0;
            font-family: monospace;
        }
        .card-total {
            background: #e94560;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .card-mission {
            color: #b8b8b8;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            max-height: 3em;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-sectors {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .sector-tag {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.75rem;
        }
        .chart-container {
            height: 150px;
            margin-top: 1rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
        }
        .modal-content {
            background: #16213e;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            padding: 2rem;
            border: 2px solid #0f3460;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #e94560;
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #0f3460;
        }
        .modal-title {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .modal-section {
            margin-bottom: 2rem;
        }
        .modal-section h3 {
            color: #e94560;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .detail-item {
            background: rgba(15, 52, 96, 0.5);
            padding: 1rem;
            border-radius: 8px;
        }
        .detail-label {
            color: #a0a0a0;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .detail-value {
            color: #fff;
            font-weight: bold;
        }
        .subventions-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .subvention-item {
            background: rgba(15, 52, 96, 0.3);
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .subvention-year {
            background: #e94560;
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .subvention-amount {
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
            margin-left: 1rem;
        }
        .subvention-object {
            flex: 1;
            margin: 0 1rem;
            color: #b8b8b8;
        }
        /* Loading and pagination styles */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #a0a0a0;
        }
        .loading-spinner {
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top: 3px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding: 1rem;
        }
        .pagination button {
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .pagination button:hover:not(:disabled) {
            background: #e94560;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-info {
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        .error-message {
            text-align: center;
            padding: 3rem;
            color: #e94560;
        }
        .error-message button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #a0a0a0;
        }

        /* Enhanced Board Member Styles */
        .board-members-section-enhanced {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.9) 0%, rgba(15, 52, 96, 0.7) 100%);
            border-radius: 16px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        .board-members-section-enhanced h3 {
            color: #e94560;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .conflict-banner {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.2) 0%, rgba(185, 28, 28, 0.3) 100%);
            border: 2px solid #dc2626;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: pulse-warning 2s infinite;
        }
        @keyframes pulse-warning {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
        }
        .conflict-banner .conflict-icon {
            font-size: 1.5rem;
        }
        .conflict-banner .conflict-text {
            color: #fecaca;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .board-members-grid-enhanced {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .board-member-card-enhanced {
            background: rgba(15, 52, 96, 0.4);
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        .board-member-card-enhanced:hover {
            border-color: rgba(233, 69, 96, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.15);
        }
        .board-member-card-enhanced.expanded {
            border-color: #e94560;
            box-shadow: 0 12px 30px rgba(233, 69, 96, 0.2);
        }
        .board-member-header {
            padding: 1.25rem;
            cursor: pointer;
            transition: background 0.2s ease;
            position: relative;
        }
        .board-member-header:hover {
            background: rgba(233, 69, 96, 0.05);
        }
        .board-member-header::after {
            content: '▼';
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #e94560;
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }
        .board-member-card-enhanced.expanded .board-member-header::after {
            transform: translateY(-50%) rotate(180deg);
        }
        .board-member-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            padding-right: 1.5rem;
        }
        .board-member-name {
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
            line-height: 1.3;
        }
        .conflict-badge {
            background: #dc2626;
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
            animation: pulse-badge 2s infinite;
        }
        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .board-member-role {
            color: #e94560;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .board-member-note-preview {
            color: #9ca3af;
            font-size: 0.85rem;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 0.75rem;
        }
        .board-member-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(233, 69, 96, 0.2);
        }
        .source-btn {
            color: #e94560;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .reliability-indicator {
            font-size: 1rem;
        }
        .board-member-expanded {
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: rgba(22, 33, 62, 0.5);
            max-height: 0;
        }
        .board-member-card-enhanced.expanded .board-member-expanded {
            max-height: 2000px;
        }
        .expanded-content {
            padding: 1.25rem;
            border-top: 1px solid rgba(233, 69, 96, 0.3);
        }
        .expanded-section {
            margin-bottom: 1.25rem;
        }
        .expanded-section:last-child {
            margin-bottom: 0;
        }
        .expanded-label {
            color: #e94560;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        .expanded-value {
            color: #e5e7eb;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .source-section .expanded-value {
            background: rgba(15, 52, 96, 0.3);
            padding: 1rem;
            border-radius: 8px;
        }
        .source-name {
            color: #fff;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .source-link {
            display: inline-block;
            color: #e94560;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            transition: color 0.2s ease;
        }
        .source-link:hover {
            color: #ff6b7d;
            text-decoration: underline;
        }
        .source-unavailable {
            color: #6b7280;
            font-size: 0.85rem;
            font-style: italic;
            display: block;
            margin-bottom: 0.75rem;
        }
        .source-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .reliability-tag {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .reliability-high {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        .reliability-medium {
            background: rgba(234, 179, 8, 0.2);
            color: #facc15;
        }
        .reliability-low {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .public-roles-section .expanded-value {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .public-role-item {
            background: rgba(15, 52, 96, 0.4);
            padding: 0.875rem;
            border-radius: 8px;
            border-left: 3px solid #3b82f6;
        }
        .public-role-title {
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }
        .public-role-org {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }
        .public-role-dates {
            color: #6b7280;
            font-size: 0.85rem;
        }
        .public-role-status {
            color: #e94560;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        .conflict-section .expanded-value {
            background: transparent;
            padding: 0;
        }
        .conflict-warning {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.15) 0%, rgba(185, 28, 28, 0.25) 100%);
            border: 1px solid rgba(220, 38, 38, 0.5);
            border-radius: 8px;
            padding: 1rem;
        }
        .conflict-warning strong {
            color: #fecaca;
            display: block;
            margin-bottom: 0.5rem;
        }
        .conflict-warning p {
            color: #fca5a5;
            font-size: 0.9rem;
            margin: 0;
            line-height: 1.5;
        }
        .data-source-enhanced {
            background: rgba(15, 52, 96, 0.3);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .source-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .source-row:last-child {
            margin-bottom: 0;
        }
        .source-label {
            color: #9ca3af;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .source-value {
            color: #e5e7eb;
            font-size: 0.9rem;
        }
        .source-external-link {
            color: #e94560;
            text-decoration: none;
            font-size: 1rem;
            transition: transform 0.2s ease;
        }
        .source-external-link:hover {
            transform: scale(1.1);
        }
        .coverage-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .coverage-complete {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        .coverage-partial {
            background: rgba(234, 179, 8, 0.2);
            color: #facc15;
        }
        .coverage-minimal, .coverage-none {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .filter-section {
            background: rgba(15, 52, 96, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .filter-section label {
            color: #e5e7eb;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .filter-section input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #e94560;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .associations-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .stats-bar {
                gap: 1.5rem;
            }
            .board-members-grid-enhanced {
                grid-template-columns: 1fr;
            }
            .conflict-banner {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ Paris Subventions</h1>
        <p>Suivi transparent des contributions municipales aux associations - Identification des potentiels conflits d'intérêts</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="totalAssociations">-</div>
            <div class="stat-label">Associations</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="totalSubventions">-</div>
            <div class="stat-label">Subventions</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="totalAmount">-</div>
            <div class="stat-label">Montant total voté</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="yearRange">-</div>
            <div class="stat-label">Période couverte</div>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher une association, SIRET ou secteur d'activité...">
            <select id="yearFilter">
                <option value="">Toutes les années</option>
            </select>
            <select id="sectorFilter">
                <option value="">Tous les secteurs</option>
            </select>
        </div>

        <div class="filter-section">
            <label>
                <input type="checkbox" id="conflictFilter">
                <span>🔍 Afficher uniquement les associations avec potentiels conflits d'intérêts</span>
            </label>
        </div>

        <div id="contentArea">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Chargement des données...</p>
            </div>
        </div>

        <div class="pagination" id="pagination" style="display: none;">
            <button id="prevBtn" onclick="changePage(-1)">← Précédent</button>
            <span class="pagination-info" id="pageInfo"></span>
            <button id="nextBtn" onclick="changePage(1)">Suivant →</button>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // State management
        let currentState = {
            page: 1,
            perPage: 50,
            search: '',
            year: '',
            sector: '',
            conflictOnly: false,
            totalPages: 1,
            associations: [],
            isLoading: false
        };

        // Enhanced board member data with sources and public roles research
        const BOARD_MEMBERS_DB_ENHANCED = {
            "THEATRE MUSICAL DE PARIS": {
                board_members: [
                    { 
                        name: "Thomas Lauriot dit Prévost", 
                        role: "Directeur général", 
                        source: "Le Monde, Libération, FranceTV (2020)",
                        source_url: "https://www.lemonde.fr/culture/article/2019/09/12/reouverture-du-theatre-du-chatelet",
                        date_verified: "2019-09-12",
                        reliability: "high",
                        publicRoles: [],
                        conflictOfInterest: false
                    },
                    { 
                        name: "Conseil d'administration", 
                        role: "Instance de gouvernance", 
                        source: "Presse - Documentation interne",
                        source_url: null,

        // Debounce function for search
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFilters();
            loadAssociations();
            loadStats();

            // Event listeners
            document.getElementById('searchInput').addEventListener('input', 
                debounce(() => {
                    currentState.page = 1;
                    currentState.search = document.getElementById('searchInput').value;
                    loadAssociations();
                    loadStats();
                }, 300)
            );

            document.getElementById('yearFilter').addEventListener('change', () => {
                currentState.page = 1;
                currentState.year = document.getElementById('yearFilter').value;
                loadAssociations();
                loadStats();
            });

            document.getElementById('sectorFilter').addEventListener('change', () => {
                currentState.page = 1;
                currentState.sector = document.getElementById('sectorFilter').value;
                loadAssociations();
                loadStats();
            });

            document.getElementById('conflictFilter').addEventListener('change', () => {
                currentState.page = 1;
                currentState.conflictOnly = document.getElementById('conflictFilter').checked;
                loadAssociations();
                loadStats();
            });

            // Close modal on outside click
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // Close modal on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        });

        async function loadFilters() {
            try {
                const response = await fetch('/api/filters');
                if (!response.ok) throw new Error('Failed to load filters');
                const data = await response.json();

                // Populate year filter
                const yearSelect = document.getElementById('yearFilter');
                yearSelect.innerHTML = '<option value="">Toutes les années</option>';
                data.years.forEach(year => {
                    yearSelect.add(new Option(year, year));
                });

                // Populate sector filter
                const sectorSelect = document.getElementById('sectorFilter');
                sectorSelect.innerHTML = '<option value="">Tous les secteurs</option>';
                data.sectors.forEach(sector => {
                    sectorSelect.add(new Option(sector, sector));
                });
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }

        async function loadAssociations() {
            if (currentState.isLoading) return;
            currentState.isLoading = true;

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Chargement des données...</p>
                </div>
            `;

            try {
                const params = new URLSearchParams({
                    page: currentState.page,
                    per_page: currentState.perPage,
                    search: currentState.search,
                    year: currentState.year,
                    sector: currentState.sector
                });

                const response = await fetch(`/api/associations?${params}`);
                if (!response.ok) throw new Error('Failed to load associations');
                const data = await response.json();

                // Filter by conflict if enabled
                let associations = data.associations;
                if (currentState.conflictOnly) {
                    associations = associations.filter(assoc => hasConflictOfInterest(assoc.name));
                }

                currentState.associations = associations;
                currentState.totalPages = data.pagination.total_pages;

                if (associations.length === 0) {
                    contentArea.innerHTML = `
                        <div class="no-results">
                            <p>Aucune association trouvée pour ces critères de recherche.</p>
                        </div>
                    `;
                    document.getElementById('pagination').style.display = 'none';
                } else {
                    renderAssociations(associations);
                    updatePagination(data.pagination);
                }
            } catch (error) {
                console.error('Error loading associations:', error);
                contentArea.innerHTML = `
                    <div class="error-message">
                        <p>Erreur lors du chargement des données</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">${error.message}</p>
                        <button onclick="loadAssociations()">Réessayer</button>
                    </div>
                `;
                document.getElementById('pagination').style.display = 'none';
            } finally {
                currentState.isLoading = false;
            }
        }

        async function loadStats() {
            try {
                const params = new URLSearchParams({
                    search: currentState.search,
                    year: currentState.year,
                    sector: currentState.sector
                });

                const response = await fetch(`/api/stats?${params}`);
                if (!response.ok) throw new Error('Failed to load stats');
                const data = await response.json();

                document.getElementById('totalAssociations').textContent = data.totalAssociations.toLocaleString('fr-FR');
                document.getElementById('totalSubventions').textContent = data.totalSubventions.toLocaleString('fr-FR');
                document.getElementById('totalAmount').textContent = formatCurrency(data.totalAmount);
                document.getElementById('yearRange').textContent = data.yearRange;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('fr-FR', { 
                style: 'currency', 
                currency: 'EUR',
                maximumFractionDigits: 0
            }).format(amount);
        }

        function getYearlyData(association) {
            const yearly = {};
            association.subventions.forEach(sub => {
                if (!yearly[sub.year]) yearly[sub.year] = 0;
                yearly[sub.year] += sub.amount;
            });
            return yearly;
        }

        // Function to find board members for an association
        function findBoardMembers(associationName) {
            if (BOARD_MEMBERS_DB_ENHANCED[associationName]) {
                return BOARD_MEMBERS_DB_ENHANCED[associationName];
            }
            const upperName = associationName.toUpperCase();
            for (const [key, data] of Object.entries(BOARD_MEMBERS_DB_ENHANCED)) {
                if (upperName.includes(key.toUpperCase()) || key.toUpperCase().includes(upperName)) {
                    return data;
                }
            }
            return null;
        }

        // Function to check if association has potential conflicts
        function hasConflictOfInterest(associationName) {
            const boardData = findBoardMembers(associationName);
            if (!boardData || !boardData.board_members) return false;
            return boardData.board_members.some(member => member.conflictOfInterest);
        }

        function renderAssociations(associations) {
            const contentArea = document.getElementById('contentArea');
            
            const grid = document.createElement('div');
            grid.className = 'associations-grid';
            grid.id = 'associationsGrid';

            associations.forEach((assoc, index) => {
                const yearlyData = getYearlyData(assoc);
                const years = Object.keys(yearlyData).sort();
                const amounts = years.map(y => yearlyData[y]);
                const chartId = `chart-${currentState.page}-${index}`;
                const hasConflict = hasConflictOfInterest(assoc.name);

                const card = document.createElement('div');
                card.className = `association-card${hasConflict ? ' has-conflict' : ''}`;
                card.onclick = () => openModal(assoc.siret);
                card.innerHTML = `
                    ${hasConflict ? '<div class="conflict-indicator">⚠️ Conflit potentiel</div>' : ''}
                    <div class="card-header">
                        <div>
                            <div class="card-title">${escapeHtml(assoc.name)}</div>
                            <div class="card-siret">SIRET: ${assoc.siret}</div>
                        </div>
                        <div class="card-total">${formatCurrency(assoc.totalAmount)}</div>
                    </div>
                    <div class="card-mission">${escapeHtml(assoc.mission)}</div>
                    <div class="card-sectors">
                        ${assoc.sectors.slice(0, 3).map(s => `<span class="sector-tag">${escapeHtml(s)}</span>`).join('')}
                        ${assoc.sectors.length > 3 ? `<span class="sector-tag">+${assoc.sectors.length - 3}</span>` : ''}
                    </div>
                    <div class="chart-container">
                        <canvas id="${chartId}"></canvas>
                    </div>
                `;
                grid.appendChild(card);

                // Render chart after card is added to DOM
                setTimeout(() => {
                    const canvas = document.getElementById(chartId);
                    if (canvas && years.length > 0) {
                        new Chart(canvas, {
                            type: 'bar',
                            data: {
                                labels: years,
                                datasets: [{
                                    label: 'Montant (€)',
                                    data: amounts,
                                    backgroundColor: hasConflict ? '#dc2626' : '#e94560',
                                    borderRadius: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: {
                                            color: '#a0a0a0',
                                            callback: function(value) {
                                                return value >= 1000 ? (value/1000) + 'k€' : value + '€';
                                            }
                                        },
                                        grid: { color: '#0f3460' }
                                    },
                                    x: {
                                        ticks: { color: '#a0a0a0' },
                                        grid: { display: false }
                                    }
                                }
                            }
                        });
                    }
                }, 0);
            });

            contentArea.innerHTML = '';
            contentArea.appendChild(grid);
        }

        function updatePagination(pagination) {
            const paginationEl = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageInfo = document.getElementById('pageInfo');

            if (pagination.total_pages <= 1) {
                paginationEl.style.display = 'none';
                return;
            }

            paginationEl.style.display = 'flex';
            prevBtn.disabled = pagination.page <= 1;
            nextBtn.disabled = pagination.page >= pagination.total_pages;
            pageInfo.textContent = `Page ${pagination.page} / ${pagination.total_pages} (${pagination.total.toLocaleString('fr-FR')} résultats)`;
        }

        function changePage(direction) {
            const newPage = currentState.page + direction;
            if (newPage >= 1 && newPage <= currentState.totalPages) {
                currentState.page = newPage;
                loadAssociations();
                document.querySelector('.search-bar').scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function openModal(siret) {
            try {
                const response = await fetch(`/api/association?siret=${encodeURIComponent(siret)}`);
                if (!response.ok) throw new Error('Failed to load association details');
                const assoc = await response.json();

                const yearlyData = getYearlyData(assoc);
                const years = Object.keys(yearlyData).sort();
                const amounts = years.map(y => yearlyData[y]);
                const hasConflict = hasConflictOfInterest(assoc.name);

                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="modal-header">
                        <div class="modal-title">${escapeHtml(assoc.name)}</div>
                        <div class="card-siret">SIRET: ${assoc.siret}</div>
                    </div>

                    <div class="modal-section">
                        <h3>📋 Informations générales</h3>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="detail-label">Secteurs d'activité</div>
                                <div class="detail-value">${assoc.sectors.join(', ') || 'Non spécifié'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-value" style="color:#e94560">${formatCurrency(assoc.totalAmount)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Nombre de subventions</div>
                                <div class="detail-value">${assoc.subventions.length}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Années actives</div>
                                <div class="detail-value">${years.join(', ') || 'N/A'}</div>
                            </div>
                        </div>
                    </div>

                    <div class="modal-section">
                        <h3>📊 Historique des contributions</h3>
                        <div style="height: 300px; margin-bottom: 1rem;">
                            <canvas id="modalChart"></canvas>
                        </div>
                        <div class="subventions-list">
                            ${assoc.subventions.sort((a, b) => b.year.localeCompare(a.year)).map(sub => `
                                <div class="subvention-item">
                                    <span class="subvention-year">${sub.year}</span>
                                    <span class="subvention-object">${escapeHtml(sub.object)}</span>
                                    <span class="subvention-amount">${formatCurrency(sub.amount)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="modal-section" id="boardMembersSection">
                        <!-- Board members will be populated dynamically -->
                    </div>
                `;

                document.getElementById('detailModal').classList.add('active');

                // Add board members section
                populateBoardMembers(assoc);

                setTimeout(() => {
                    new Chart(document.getElementById('modalChart'), {
                        type: 'line',
                        data: {
                            labels: years,
                            datasets: [{
                                label: 'Montant des subventions (€)',
                                data: amounts,
                                borderColor: hasConflict ? '#dc2626' : '#e94560',
                                backgroundColor: hasConflict ? 'rgba(220, 38, 38, 0.2)' : 'rgba(233, 69, 96, 0.2)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#a0a0a0',
                                        callback: function(value) {
                                            return formatCurrency(value);
                                        }
                                    },
                                    grid: { color: '#0f3460' }
                                },
                                x: {
                                    ticks: { color: '#a0a0a0' },
                                    grid: { display: false }
                                }
                            }
                        }
                    });
                }, 100);
            } catch (error) {
                console.error('Error loading association details:', error);
                alert('Erreur lors du chargement des détails de l\'association');
            }
        }

        function populateBoardMembers(association) {
            const boardSection = document.getElementById('boardMembersSection');
            const boardData = findBoardMembers(association.name);
            
            if (boardData && boardData.board_members && boardData.board_members.length > 0) {
                const hasConflict = boardData.board_members.some(m => m.conflictOfInterest);
                const membersHTML = boardData.board_members.map((member, index) => {
                    const hasSourceURL = member.source_url && member.source_url !== null;
                    const reliabilityText = {
                        'high': 'Source vérifiée',
                        'medium': 'Source professionnelle',
                        'low': 'Source à vérifier'
                    }[member.reliability] || 'Fiabilité inconnue';
                    
                    return `
                        <div class="board-member-card-enhanced" data-member-index="${index}">
                            <div class="board-member-header" onclick="toggleBoardMemberCard(${index})">
                                <div class="board-member-title-row">
                                    <div class="board-member-name">${escapeHtml(member.name)}</div>
                                    ${member.conflictOfInterest ? '<span class="conflict-badge" title="Potentiel conflit d\'intérêts">⚠️</span>' : ''}
                                </div>
                                <div class="board-member-role">${escapeHtml(member.role)}</div>
                                ${member.note ? `<div class="board-member-note-preview">${escapeHtml(member.note.substring(0, 60))}${member.note.length > 60 ? '...' : ''}</div>` : ''}
                                <div class="board-member-footer-row">
                                    <span class="source-btn">📋 Source</span>
                                    <span class="reliability-indicator" title="${reliabilityText}">${member.reliability === 'high' ? '🔒' : member.reliability === 'medium' ? '🔓' : '⚠️'}</span>
                                </div>
                            </div>
                            <div class="board-member-expanded" id="board-member-expanded-${index}">
                                <div class="expanded-content">
                                    ${member.note ? `
                                        <div class="expanded-section">
                                            <div class="expanded-label">Note</div>
                                            <div class="expanded-value">${escapeHtml(member.note)}</div>
                                        </div>
                                    ` : ''}
                                    
                                    <div class="expanded-section source-section">
                                        <div class="expanded-label">📚 Source de l'information</div>
                                        <div class="expanded-value">
                                            <div class="source-name">${escapeHtml(member.source)}</div>
                                            ${hasSourceURL ? `<a href="${member.source_url}" target="_blank" class="source-link" rel="noopener">Voir la source ↗</a>` : '<span class="source-unavailable">Lien non disponible</span>'}
                                            <div class="source-meta">
                                                <span>Vérifié le: ${member.date_verified || 'Non daté'}</span>
                                                <span class="reliability-tag reliability-${member.reliability}">${reliabilityText}</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    ${member.publicRoles && member.publicRoles.length > 0 ? `
                                        <div class="expanded-section public-roles-section">
                                            <div class="expanded-label">🏛️ Mandats publics</div>
                                            <div class="expanded-value">
                                                ${member.publicRoles.map(role => `
                                                    <div class="public-role-item">
                                                        <div class="public-role-title">${escapeHtml(role.role)}</div>
                                                        <div class="public-role-org">${escapeHtml(role.organization)}</div>
                                                        <div class="public-role-dates">
                                                            ${role.start_date || '?'} - ${role.end_date || 'présent'}
                                                            ${role.status ? `<span class="public-role-status">(${role.status})</span>` : ''}
                                                        </div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}
                                    
                                    ${member.conflictOfInterest ? `
                                        <div class="expanded-section conflict-section">
                                            <div class="expanded-label">⚠️ Alerte conflit d'intérêts</div>
                                            <div class="expanded-value">
                                                <div class="conflict-warning">
                                                    <strong>Potentiel conflit détecté</strong>
                                                    <p>${escapeHtml(member.conflictReason || 'Ce membre a occupé des fonctions publiques susceptibles de créer un conflit d\'intérêts.')}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                const conflictBanner = hasConflict ? `
                    <div class="conflict-banner">
                        <span class="conflict-icon">⚠️</span>
                        <span class="conflict-text">Cette association comporte un potentiel conflit d'intérêts</span>
                    </div>
                ` : '';
                
                boardSection.innerHTML = `
                    <div class="board-members-section-enhanced">
                        <h3><span class="icon">👥</span> Membres du Bureau / Conseil d'Administration</h3>
                        ${conflictBanner}
                        <div class="board-members-grid-enhanced">
                            ${membersHTML}
                        </div>
                        <div class="data-source-enhanced">
                            <div class="source-row">
                                <span class="source-label">📚 Source principale:</span>
                                <span class="source-value">${escapeHtml(boardData.data_source)}</span>
                                ${boardData.data_source_url ? `<a href="${boardData.data_source_url}" target="_blank" class="source-external-link" rel="noopener">↗</a>` : ''}
                            </div>
                            <div class="source-row">
                                <span class="source-label">📅 Mis à jour:</span>
                                <span class="source-value">${boardData.last_updated}</span>
                            </div>
                            <div class="source-row">
                                <span class="source-label">📊 Couverture:</span>
                                <span class="coverage-tag coverage-${boardData.coverage}">
                                    ${boardData.coverage === 'complete' ? 'Complète' : boardData.coverage === 'partial' ? 'Partielle' : 'Minimale'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                boardSection.innerHTML = `
                    <div class="board-members-section-enhanced">
                        <h3><span class="icon">👥</span> Membres du Bureau / Conseil d'Administration</h3>
                        <div style="background: rgba(15, 52, 96, 0.3); padding: 2rem; border-radius: 8px; text-align: center;">
                            <span style="font-size: 2rem;">🔍</span>
                            <p style="color: #a0a0a0; margin-top: 1rem;">Données en cours de recherche</p>
                            <p style="font-size: 0.9rem; margin-top: 0.5rem; color: #e94560;">
                                Cette section permettra d'identifier les potentiels conflits d'intérêts avec les élus et agents publics.
                            </p>
                        </div>
                    </div>
                `;
            }
        }

        function toggleBoardMemberCard(index) {
            const expandedSection = document.getElementById(`board-member-expanded-${index}`);
            const card = expandedSection.closest('.board-member-card-enhanced');
            
            if (card.classList.contains('expanded')) {
                card.classList.remove('expanded');
            } else {
                card.classList.add('expanded');
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
